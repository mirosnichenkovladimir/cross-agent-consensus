schema_version: cross-agent-consensus-config-2
defaults:
  profile: document-consensus
  run_root: runs
  round_limits:
    max_fresh_review_rounds: 1
    max_fresh_review_rounds_without_human_approval: 2
    max_launched_review_batches: 3
    max_remediation_rounds_per_finding: 2
participants:
  orchestrator: codex-orchestrator
  author: codex-primary
  reviewers:
    - codex
    - claude
  validators: []
  human_supervisor: none
participant_profiles:
  orchestrator-default:
    role: orchestrator
    instructions:
      - enforce CAC policy and preserve protocol evidence
  author-default:
    role: author
    instructions:
      - produce the requested artifact and respond to material findings
  reviewer-default:
    role: reviewer
    instructions:
      - review the declared artifact and emit evidence-backed findings
  validator-default:
    role: validator
    instructions:
      - produce deterministic validation evidence
  human_supervisor-default:
    role: human_supervisor
    instructions:
      - resolve escalations and binding decisions
execution_profiles:
  manual-default:
    adapter: manual
    command: []
    prompt_transport: manual
    output_mode: manual_handoff
    supports_resume: false
    env: []
  codex-reviewer-default:
    adapter: codex-cli
    command:
      - codex
      - exec
      - --skip-git-repo-check
      - --json
      - "-"
    prompt_transport: stdin
    output_mode: stream_json
    supports_resume: true
    env:
      - HOME
      - PATH
      - TMPDIR
      - LANG
      - LC_ALL
      - CODEX_HOME
      - OPENAI_API_KEY
      - HTTP_PROXY
      - HTTPS_PROXY
      - NO_PROXY
  claude-reviewer-default:
    adapter: claude-cli
    command:
      - claude
      - -p
      - --verbose
      - --output-format
      - stream-json
      - --include-partial-messages
    prompt_transport: stdin
    output_mode: stream_json
    supports_resume: true
    env:
      - HOME
      - PATH
      - TMPDIR
      - LANG
      - LC_ALL
      - CLAUDE_CONFIG_DIR
      - ANTHROPIC_API_KEY
      - HTTP_PROXY
      - HTTPS_PROXY
      - NO_PROXY
  hermes-reviewer-default:
    adapter: hermes-cli
    command:
      - python3
      - -m
      - cross_agent_consensus.hermes_cli
      - --ignore-rules
    prompt_transport: stdin
    output_mode: stream_json
    supports_resume: true
    env:
      - HOME
      - PATH
      - PYTHONPATH
      - TMPDIR
      - LANG
      - LC_ALL
      - HERMES_HOME
      - HERMES_INFERENCE_MODEL
      - HTTP_PROXY
      - HTTPS_PROXY
      - NO_PROXY
  kimi-reviewer-default:
    adapter: kimi-cli
    command:
      - python3
      - -m
      - cross_agent_consensus.kimi_cli
    prompt_transport: stdin
    output_mode: stream_json
    supports_resume: true
    rate_limit_circuit_breaker:
      max_consecutive_429_events: 3
      max_cumulative_retry_delay_seconds: 120
    env:
      - HOME
      - PATH
      - PYTHONPATH
      - TMPDIR
      - LANG
      - LC_ALL
      - KIMI_CODE_HOME
      - KIMI_API_KEY
      - KIMI_BASE_URL
      - KIMI_MODEL_API_KEY
      - KIMI_MODEL_BASE_URL
      - KIMI_DISABLE_TELEMETRY
      - HTTP_PROXY
      - HTTPS_PROXY
      - NO_PROXY
participant_identities:
  codex-orchestrator:
    participant_profile_id: orchestrator-default
    execution_profile_id: manual-default
  codex-primary:
    participant_profile_id: author-default
    execution_profile_id: manual-default
  codex:
    participant_profile_id: reviewer-default
    execution_profile_id: codex-reviewer-default
  claude:
    participant_profile_id: reviewer-default
    execution_profile_id: claude-reviewer-default
  hermes:
    participant_profile_id: reviewer-default
    execution_profile_id: hermes-reviewer-default
  kimi:
    participant_profile_id: reviewer-default
    execution_profile_id: kimi-reviewer-default
invocation:
  require_invocation_ready: true
  direct_reviewer_cli: explicit_only
  peek:
    interval_seconds: 180
    tail: 80
    snippet_chars: 160
    monitor_stale_seconds: 30
feedback:
  enabled: false
